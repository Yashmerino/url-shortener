<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-lg shadow-xl p-8 sm:p-12 max-w-md w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-2">URL Shortener</h1>
            <p class="text-gray-600">Shorten your long URLs instantly</p>
        </div>

        <!-- Form -->
        <form th:action="@{/}" method="post" class="space-y-6">
            <!-- Input Field -->
            <div>
                <label for="originalUrl" class="block text-sm font-medium text-gray-700 mb-2">
                    Enter your URL:
                </label>
                <input 
                    type="url" 
                    id="originalUrl" 
                    name="originalUrl" 
                    th:value="${originalUrl}"
                    placeholder="https://example.com/very/long/url" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                />
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
            >
                Generate Short Link
            </button>
        </form>

        <!-- Success Message and Result -->
        <div th:if="${shortUrl}" class="mt-8 pt-8 border-t border-gray-200">
            <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
                <p class="text-sm text-green-800 font-medium">✓ Short link generated successfully!</p>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Your short URL:</label>
                    <div class="flex gap-2">
                        <input 
                            type="text" 
                            th:value="${shortUrl}" 
                            readonly
                            class="flex-1 px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-indigo-600 font-semibold"
                        />
                        <button 
                            type="button" 
                            onclick="copyToClipboard(this)"
                            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition duration-200 text-sm font-medium"
                        >
                            Copy
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Original URL:</label>
                    <input 
                        type="text" 
                        th:value="${originalUrl}" 
                        readonly
                        class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-gray-600 text-sm break-all"
                    />
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <div th:if="${error}" class="mt-8 pt-8 border-t border-gray-200">
            <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                <p class="text-sm text-red-800 font-medium" th:text="${error}">Error message</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-10 pt-6 border-t border-gray-200 text-center">
            <p class="text-xs text-gray-500">Built with Tailwind CSS & Thymeleaf</p>
        </div>
    </div>

    <script>
        function copyToClipboard(button) {
            const input = button.previousElementSibling;
            input.select();
            document.execCommand('copy');
            
            const originalText = button.textContent;
            button.textContent = 'Copied!';
            button.classList.add('bg-green-600');
            button.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
            
            setTimeout(() => {
                button.textContent = originalText;
                button.classList.remove('bg-green-600');
                button.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
            }, 2000);
        }
    </script>
</body>
</html>
