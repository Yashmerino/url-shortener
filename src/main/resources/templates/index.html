<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{app.title}">URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
    <body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-lg shadow-xl p-8 sm:p-12 max-w-md w-full">

            <div class="flex justify-end mb-4">
                <div class="relative inline-block text-left">
                    <select
                            id="languageSelect"
                            onchange="changeLanguage(this.value)"
                            class="block w-full pl-3 pr-8 py-1 text-xs border border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 rounded-md bg-gray-50 text-gray-600 font-medium cursor-pointer shadow-sm"
                    >
                        <option value="en" th:selected="${#locale.language == 'en'}">English (EN)</option>
                        <option value="ro" th:selected="${#locale.language == 'ro'}">Română (RO)</option>
                    </select>
                </div>
            </div>

            <div class="text-center mb-8">
                <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-2" th:text="#{app.header}">URL Shortener</h1>
                <p class="text-gray-600" th:text="#{app.subheader}">Shorten your long URLs instantly</p>
            </div>

            <form th:action="@{/}" method="post" class="space-y-6">
                <div>
                    <label for="originalUrl" class="block text-sm font-medium text-gray-700 mb-2" th:text="#{form.label}">
                        Enter your URL:
                    </label>
                    <input
                            type="url"
                            id="originalUrl"
                            name="originalUrl"
                            th:value="${originalUrl}"
                            th:placeholder="#{form.placeholder}"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                    />
                </div>

                <button
                        type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
                        th:text="#{form.button}"
                >
                    Generate Short Link
                </button>
            </form>

            <div th:if="${shortUrl}" class="mt-8 pt-8 border-t border-gray-200">
                <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
                    <p class="text-sm text-green-800 font-medium" th:text="#{result.success}">✓ Short link generated successfully!</p>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2" th:text="#{result.shortUrl}">Your short URL:</label>
                        <div class="flex gap-2">
                            <input
                                    type="text"
                                    id="shortUrlResult"
                                    th:value="${shortUrl}"
                                    readonly
                                    class="flex-1 px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg text-indigo-600 font-semibold"
                            />
                            <button
                                    type="button"
                                    onclick="copyToClipboard(this)"
                                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition duration-200 text-sm font-medium"
                                    th:text="#{result.copy}"
                            >
                                Copy
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${error}" class="mt-8 pt-8 border-t border-gray-200">
                <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                    <p class="text-sm text-red-800 font-medium" th:text="${error}">Error message</p>
                </div>
            </div>

            <div class="mt-10 pt-6 border-t border-gray-200 text-center">
                <p class="text-xs text-gray-500" th:text="#{app.footer}">Built with Tailwind CSS & Thymeleaf</p>
            </div>
        </div>

        <script th:inline="javascript">
            function copyToClipboard(button) {
                const input = document.getElementById('shortUrlResult');
                input.select();
                document.execCommand('copy');

                const originalText = button.textContent;
                button.textContent = [[#{result.copied}]];
                button.classList.add('bg-green-600');
                button.classList.remove('bg-indigo-600');

                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('bg-green-600');
                    button.classList.add('bg-indigo-600');
                }, 2000);
            }

            function changeLanguage(lang) {
                const url = new URL(window.location.href);
                url.searchParams.set('lang', lang);
                window.location.href = url.toString();
            }
        </script>
    </body>
</html>
