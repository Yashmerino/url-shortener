<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{notfound.title}">Link Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-red-50 to-orange-100 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- Language Selector -->
    <div class="absolute top-8 right-8 flex gap-2">
        <a href="?lang=en" class="px-3 py-2 rounded-lg bg-white text-gray-800 hover:bg-gray-100 text-sm font-medium transition border border-gray-300">EN</a>
        <a href="?lang=ro" class="px-3 py-2 rounded-lg bg-white text-gray-800 hover:bg-gray-100 text-sm font-medium transition border border-gray-300">RO</a>
    </div>

    <div class="bg-white rounded-lg shadow-xl p-8 sm:p-12 max-w-md w-full">
        <!-- 404 Icon -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-red-100 rounded-full mb-4">
                <svg class="w-12 h-12 text-red-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 class="text-4xl sm:text-5xl font-bold text-red-600 mb-2" th:text="#{notfound.header}">404 - Link Not Found</h1>
            <p class="text-gray-600 text-lg" th:text="#{notfound.message}">Sorry, the short link you're looking for doesn't exist or has expired.</p>
        </div>

        <!-- Return Home Button -->
        <div class="mt-8">
            <a 
                    href="/"
                    class="w-full block text-center bg-red-600 hover:bg-red-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2"
                    th:text="#{notfound.button}"
            >Return Home</a>
        </div>

        <!-- Footer -->
        <div class="mt-10 pt-6 border-t border-gray-200 text-center">
            <p class="text-xs text-gray-500" th:text="#{app.footer}">Built with Tailwind CSS & Thymeleaf</p>
        </div>
    </div>
</body>
</html>
