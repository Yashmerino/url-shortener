name: Playwright E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: url_shortener
          POSTGRES_PASSWORD: url_shortener_password
          POSTGRES_DB: url_shortener
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Start Spring Boot app
        run: |
          nohup bash -c './gradlew bootRun > app.log 2>&1 &'
          echo "Waiting for application to start..."
          sleep 20
          if ! curl --silent http://localhost:8080 > /dev/null; then
            echo "Application failed to start"
            cat app.log
            exit 1
          fi
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/url_shortener
          SPRING_DATASOURCE_USERNAME: url_shortener
          SPRING_DATASOURCE_PASSWORD: url_shortener_password
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: e2e-tests
        run: npm ci && npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: e2e-tests
        run: npm run test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 30
