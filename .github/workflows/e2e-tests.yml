name: Playwright E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: url_shortener
          POSTGRES_PASSWORD: url_shortener_password
          POSTGRES_DB: url_shortener
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Build Spring Boot app
        run: ./gradlew build -DskipTests --no-daemon
        timeout-minutes: 30
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/url_shortener
          SPRING_DATASOURCE_USERNAME: url_shortener
          SPRING_DATASOURCE_PASSWORD: url_shortener_password
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: Start Spring Boot app in background
        run: |
          java -jar build/libs/*.jar > app.log 2>&1 &
          sleep 5
          echo "App started, checking readiness..."
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/url_shortener
          SPRING_DATASOURCE_USERNAME: url_shortener
          SPRING_DATASOURCE_PASSWORD: url_shortener_password
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          SERVER_PORT: 8080

      - name: Wait for app to be ready
        run: |
          echo "Waiting for application to start at http://localhost:8080..."
          for i in {1..120}; do
            HTTP_CODE=$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:8080 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "✓ Application is ready! (HTTP $HTTP_CODE)"
              exit 0
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "Attempt $i/120... (got HTTP $HTTP_CODE)"
            fi
            sleep 1
          done
          echo "✗ Application failed to start after 120 seconds"
          echo "=== Last 50 lines of app.log ==="
          tail -50 app.log
          echo "=== Running processes ==="
          ps aux | grep -E 'java|gradle' || echo "No Java/Gradle processes"
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        working-directory: e2e-tests
        run: npm ci && npx playwright install --with-deps

      - name: Check if app is running
        run: |
          for i in {1..10}; do
            if curl --silent http://localhost:8080 > /dev/null; then
              echo "✓ Application is running"
              curl -v http://localhost:8080 2>&1 | head -20
              exit 0
            fi
            echo "Attempt $i/10 - waiting..."
            sleep 2
          done
          echo "✗ Application is NOT running"
          cat app.log || echo "No app.log found"
          ps aux | grep -E 'gradle|java' || true
          exit 1

      - name: Run Playwright tests
        working-directory: e2e-tests
        run: npm run test -- --reporter=html,list
        continue-on-error: true

      - name: Show test results
        if: always()
        run: |
          if [ -f e2e-tests/test-results/results.json ]; then
            cat e2e-tests/test-results/results.json
          fi
          if [ -d e2e-tests/playwright-report ]; then
            echo "Playwright report found"
            ls -la e2e-tests/playwright-report/ || true
          else
            echo "No playwright report directory"
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 30
